{% extends "base.html" %}

{% block content %}
<div class="card">
    <div class="card-header">Configurar Custos Adicionais (R$/Unidade)</div>
    <div class="card-body">
        <form method="POST" class="row g-2 mb-3 align-items-end">
            <div class="col-md-4">
                <label>Despesa</label>
                <select name="despesa" class="form-select" required>
                    {% for item in todas_despesas %}
                    <option value="{{ item }}">{{ item }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3">
                <label>Custo Unitário (R$)</label>
                <input type="number" step="0.00001" name="custo_unidade" class="form-control" required>
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100">Salvar</button>
            </div>
        </form>
        <div class="table-responsive table-wrapper">
            <table class="table table-striped table-bordered table-sm">
                <thead><tr><th>Despesa</th><th>Valor (R$)</th><th>Data</th><th>Ações</th></tr></thead>
                <tbody>
                    {% for h in hist %}
                    <tr>
                        <td>{{ h.despesa }}</td>
                        <td>{{ "R$ %.5f"|format(h.custo_unidade) }}</td>
                        <td>{{ h.data_registro }}</td>
                        <td>
                            <a href="{{ url_for('custos_operacionais.editar_custo_operacional', id=h.id) }}" class="btn btn-sm btn-warning">Editar</a>
                            <form method="POST" action="{{ url_for('custos_operacionais.excluir_custo_operacional', id=h.id) }}" style="display:inline;" onsubmit="return confirm('Tem certeza que deseja excluir este registro?');">
                                <button type="submit" class="btn btn-sm btn-danger">Excluir</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
