{% extends "base.html" %}

{% block content %}
<div class="card">
    <div class="card-header">Configurar Custo Papel (R$/kg)</div>
    <div class="card-body">
        <form method="POST" class="row g-2 mb-3 align-items-end">
            <div class="col-md-4">
                <label>Papel</label>
                <select name="papel" class="form-select" required>
                    <option value="">Selecione o papel</option>
                    {% for p in papeis %}
                    <option value="{{ p.papel }}">{{ p.papel }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3">
                <label>Custo Kg (R$)</label>
                <input type="number" step="0.01" name="custo_kg" class="form-control" required>
            </div>
            <div class="col-md-3">
                <label>Vigência</label>
                <input type="date" name="data_registro" class="form-control" value="{{ data_atual }}" required>
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100">Salvar</button>
            </div>
        </form>
        <div class="table-responsive table-wrapper">
            <table class="table table-striped table-bordered table-sm">
                <thead><tr><th>Papel</th><th>Custo (R$/kg)</th><th>Vigência</th><th>Ações</th></tr></thead>
                <tbody>
                    {% for h in hist %}
                    <tr>
                        <td>{{ h.papel }}</td>
                        <td>{{ "%.2f"|format(h.custo_kg) }}</td>
                        <td>{{ h.data_registro }}</td>
                        <td>
                            <a href="{{ url_for('custos_papel.editar_custo_papel', id=h.id) }}" class="btn btn-sm btn-warning">Editar</a>
                            <form method="POST" action="{{ url_for('custos_papel.excluir_custo_papel', id=h.id) }}" style="display:inline;" onsubmit="return confirm('Tem certeza que deseja excluir este registro?');">
                                <button type="submit" class="btn btn-sm btn-danger">Excluir</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <a href="{{ url_for('custos_papel.exportar_custos_config') }}" class="btn btn-success btn-sm mt-2">Exportar Histórico</a>
    </div>
</div>
{% endblock %}
