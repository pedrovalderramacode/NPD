<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRODUÇÃO - {{ title | default('Produção e Custos') }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f2f4f8; font-size: 0.85rem; }
        /* Header igual às páginas Histórico, OF-Refugo, Comparação Quantidade */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo { font-weight: bold; color: #fff; background: #1a2b3c; padding: 8px 12px; border-radius: 4px; font-size: 16px; }
        a.logo { text-decoration: none; display: inline-block; }
        a.logo:hover { opacity: 0.9; }
        .header-brand { display: flex; gap: 10px; align-items: center; }
        .logo-link { text-decoration: none; color: #fff; text-transform: uppercase; }
        .logo-link:hover { opacity: 0.9; }
        .logo-link.active { background: #32475b !important; }
        .tabs { display: flex; gap: 8px; flex-wrap: wrap; }
        .tabs .tab { padding: 8px 16px; color: #191970; text-decoration: none; font-size: 14px; border-radius: 4px; }
        .tabs .tab:hover { background: #e9ecef; }
        .tabs .tab.active { background: #32475b; color: #fff; }
        .table thead {
            background-color: #1a2b4c; color: white;
            white-space: nowrap; position: sticky; top: 0; z-index: 10;
        }
        .card-header { background-color: #1a2b4c; color: white; font-weight: bold; }
        .table-sm td, .table-sm th { padding: 0.25rem 0.4rem; white-space: nowrap; vertical-align: middle; }
        .container-fluid-full { width: 100%; padding: 0 15px; }
        .table-wrapper { max-height: calc(100vh - 240px); overflow-y: auto; }
        .col-destaque-op { background-color: #fff3cd !important; }
        .col-destaque-final { background-color: #cfe2ff !important; font-weight: bold; }
        .table-col-of { background-color: #2a3c5a; color: white; font-weight: bold; }
        .table-col-qtd { background-color: #e6e6fa; font-weight: bold; }
        .table tbody tr:hover { background-color: #f0f0f0 !important; cursor: pointer; }
        .alert-success { background-color: #d4edda; color: #155724; border-color: #c3e6cb; }
        .alert-danger { background-color: #f8d7da; color: #721c24; border-color: #f5c6cb; }
        .nav-section { font-size: 0.75rem; color: #a0c4ff; text-transform: uppercase; padding: 0.25rem 0.5rem; }
    </style>
</head>
<body>

<div class="container-fluid mt-3">
  <div class="header">
    <div class="header-brand">
      <a href="{{ url_for('main.index') }}" class="logo">PRODUÇÃO</a>
      <a href="{{ url_for('relatorio.custo') }}" class="logo logo-link {% if request.endpoint and request.endpoint.startswith(('relatorio', 'custos_papel', 'custos_operacionais')) %}active{% endif %}">Custos</a>
    </div>
    <nav class="tabs">
      <a href="{{ url_for('relatorio.custo') }}" class="tab {% if request.endpoint and request.endpoint.startswith('relatorio') %}active{% endif %}">Relatório de Custos</a>
      <a href="{{ url_for('custos_papel.configurar_custos') }}" class="tab {% if request.endpoint and request.endpoint.startswith('custos_papel') %}active{% endif %}">Custo Papel</a>
      <a href="{{ url_for('custos_operacionais.configurar_custo_operacional') }}" class="tab {% if request.endpoint and request.endpoint.startswith('custos_operacionais') %}active{% endif %}">Custos Adicionais</a>
    </nav>
  </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-dismissible fade show {{ category }}" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
